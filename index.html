<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For You</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom, #fff0f5, #fdfdfd);
      text-align: center;
      overflow: hidden;
      height: 100vh;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding-top: 60px;
    }

    .start {
      cursor: pointer;
      color: #888;
      text-decoration: underline;
    }

    .message {
      margin-top: 20px;
      font-size: 18px;
      line-height: 1.6;
      min-height: 180px;
      padding: 10px;
    }

    img {
      width: 220px;
      margin-top: 20px;
      border-radius: 12px;
      opacity: 0.9;
    }

    .buttons {
      margin-top: 20px;
      display: none;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    #yesBtn {
      background-color: #ff8fa3;
      color: white;
    }

    #noBtn {
      position: absolute;
      background-color: #ddd;
    }

    .final {
      margin-top: 25px;
      font-size: 20px;
      color: #444;
      display: none;
    }

    /* floating hearts */
    .heart {
      position: absolute;
      color: #ff6b81;
      font-size: 16px;
      animation: float 6s linear infinite;
      opacity: 0.4;
    }

    @keyframes float {
      0% { transform: translateY(100vh); opacity: 0; }
      50% { opacity: 0.6; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }
  </style>
</head>

<body>

  <div class="container">
    <p class="start">click here</p>

    <div class="message" id="msg"
      data-text="Hey Hyrea,<br><br>

I just want to say sorry.<br><br>

Mali yung ginawa kong pagsisinungaling. Hindi ko dapat ginawa yun, kahit na ginawa ko lang yun dahil gusto kitang mapaniwala at maayos tayo.<br><br>

Pero gusto ko rin maging clear — wala talaga akong ibang babae.<br><br>

I hope you can understand where I’m coming from.">
    </div>

    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e" />

    <div class="buttons" id="buttons">
      <p>Will you forgive me?</p>
      <button id="yesBtn">Yes</button>
      <button id="noBtn">No</button>
    </div>

    <div class="final" id="finalText">
      Thank you 🤍 Take care.
    </div>
  </div>

  <!-- soft music -->
  <audio autoplay loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_3f0d3b8c3e.mp3?filename=romantic-piano-110194.mp3" type="audio/mpeg">
  </audio>

  <script>
    let running = false;

    function typeWriter(text, i) {
      if (i < text.length) {
        document.getElementById("msg").innerHTML =
          text.substring(0, i + 1) + " 🤍";
        setTimeout(() => typeWriter(text, i + 1), 35);
      } else {
        running = false;
        document.getElementById("buttons").style.display = "block";
      }
    }

    document.querySelector(".start").addEventListener("click", function (e) {
      e.preventDefault();
      if (!running) {
        running = true;
        const text = document.getElementById("msg").dataset.text;
        typeWriter(text, 0);
      }
    });

    // YES button
    document.getElementById("yesBtn").addEventListener("click", function () {
      document.getElementById("buttons").style.display = "none";
      document.getElementById("msg").style.display = "none";
      document.querySelector("img").style.display = "none";
      document.getElementById("finalText").style.display = "block";
    });

    // NO button behavior
    const noBtn = document.getElementById("noBtn");
    const texts = [
      "Are you sure?",
      "Please? 🥺",
      "Think again...",
      "Last chance 😅"
    ];
    let count = 0;

    function moveButton() {
      const x = Math.random() * (window.innerWidth - 100);
      const y = Math.random() * (window.innerHeight - 50);
      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    }

    noBtn.addEventListener("click", function () {
      if (count < texts.length) {
        noBtn.textContent = texts[count];
        count++;
        moveButton();
      } else {
        noBtn.textContent = "Okay";
        noBtn.onclick = function () {
          document.getElementById("buttons").style.display = "none";
          document.getElementById("finalText").style.display = "block";
        };
      }
    });

    // floating hearts
    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerText = "❤";
      heart.style.left = Math.random() * 100 + "vw";
      document.body.appendChild(heart);

      setTimeout(() => heart.remove(), 6000);
    }

    setInterval(createHeart, 800);
  </script>

</body>
</html>
