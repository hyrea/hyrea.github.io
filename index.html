<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For You</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom, #fff0f5, #fdfdfd);
      text-align: center;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
      position: relative;
    }

    .start {
      cursor: pointer;
      color: #888;
      text-decoration: underline;
    }

    .message {
      margin-top: 20px;
      font-size: 16px;
      line-height: 1.6;
      min-height: 150px;
    }

    img {
      width: 100%;
      max-width: 250px;
      margin-top: 20px;
      border-radius: 12px;
    }

    .buttons {
      margin-top: 20px;
      position: relative;
      height: 120px;
    }

    button {
      padding: 10px 18px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    #yesBtn {
      background-color: #ff8fa3;
      color: white;
      position: relative;
      z-index: 2;
    }

    #noBtn {
      position: absolute;
      background-color: #ddd;
    }

    .final {
      margin-top: 25px;
      font-size: 18px;
      color: #444;
      display: none;
    }

    audio {
      margin-top: 20px;
      width: 100%;
      max-width: 250px;
    }

    /* hearts */
    .heart {
      position: fixed;
      color: #ff6b81;
      font-size: 14px;
      animation: float 6s linear infinite;
      opacity: 0.4;
      pointer-events: none;
    }

    @keyframes float {
      0% { transform: translateY(100vh); opacity: 0; }
      50% { opacity: 0.6; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }
  </style>
</head>

<body>

  <div class="container">
    <p class="start">click here</p>

    <div class="message" id="msg"
      data-text="Hey Hyrea,<br><br>

I just want to say sorry.<br><br>

Mali yung ginawa kong pagsisinungaling. Hindi ko dapat ginawa yun, kahit na ginawa ko lang yun dahil gusto kitang maniwala at magkaayos tayo.<br><br>

Pero gusto ko rin maging clear - wala talaga akong ibang babae. Wala akong kinausap na babae. <br><br>

I hope you can understand where I’m coming from. I love you mahal ko. 🤍">
    </div>

    <img src="cat.gif" alt="cat asking question" class="responsive" />

    <!-- CAT AUDIO -->
    <audio controls loop id="bgMusic">
      <source src="mixkit-cartoon-kitty-begging-meow-92.wav" type="audio/mpeg">
      Your browser does not support the audio element.
    </audio>

    <div class="buttons" id="buttons" style="display:none;">
      <p>Will you forgive me?</p>
      <button id="yesBtn">Yes</button>
      <button id="noBtn">No</button>
    </div>

    <div class="final" id="finalText">
      Thank you 🤍 Take care.
    </div>
  </div>

  <script>
    let running = false;

    function typeWriter(text, i) {
      if (i < text.length) {
        document.getElementById("msg").innerHTML =
          text.substring(0, i + 1) + " 🤍";
        setTimeout(() => typeWriter(text, i + 1), 35);
      } else {
        running = false;
        document.getElementById("buttons").style.display = "block";
        moveButton();
      }
    }

    document.querySelector(".start").addEventListener("click", function (e) {
      e.preventDefault();
      if (!running) {
        running = true;

        // 🔊 autoplay fix for mobile
        const audio = document.getElementById("bgMusic");
        audio.play().catch(() => {});

        const text = document.getElementById("msg").dataset.text;
        typeWriter(text, 0);
      }
    });

    // YES
    document.getElementById("yesBtn").addEventListener("click", function () {
      document.getElementById("buttons").style.display = "none";
      document.getElementById("msg").style.display = "none";
      document.querySelector("img").style.display = "none";
      document.getElementById("finalText").style.display = "block";
    });

    // NO logic
    const noBtn = document.getElementById("noBtn");
    const container = document.querySelector(".buttons");

    const texts = [
      "Are you sure?",
      "Please? 🥺",
      "Think again...",
      "Last chance 😅"
    ];

    let count = 0;

    function moveButton() {
      const maxX = container.clientWidth - 100;
      const maxY = container.clientHeight - 40;

      const x = Math.random() * maxX;
      const y = Math.random() * maxY;

      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    }

    noBtn.addEventListener("click", function () {
      if (count < texts.length) {
        noBtn.textContent = texts[count];
        count++;
        moveButton();
      } else {
        noBtn.textContent = "Okay";
        noBtn.onclick = function () {
          document.getElementById("buttons").style.display = "none";
          document.getElementById("finalText").style.display = "block";
        };
      }
    });

    // hearts
    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerText = "❤";
      heart.style.left = Math.random() * 100 + "vw";

      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 6000);
    }

    setInterval(createHeart, 800);
  </script>

</body>
</html>
